<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare+ - Complete Pet Healthcare Solution</title>
    <link rel="stylesheet" href="pet.css">
</head>

<body>
    <!-- Auth Section -->
    <div id="authSection" class="auth-section">
        <!-- Login Form -->
        <div id="loginForm" class="auth-container active">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-large">
                        <div style="font-size: 4rem;">🐾</div>
                        <div class="logo-text-large">PetCare+</div>
                    </div>
                    <h2 class="auth-title">Welcome Back!</h2>
                    <p class="auth-subtitle">Login to continue caring for your pets</p>
                </div>

                <form class="auth-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password"
                            required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-large">Sign In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account?
                    <a href="#" class="auth-link" onclick="showRegister(); return false;">Sign up now</a>
                </div>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-large">
                        <div style="font-size: 4rem;">🐾</div>
                        <div class="logo-text-large">PetCare+</div>
                    </div>
                    <h2 class="auth-title">Create Account</h2>
                    <p class="auth-subtitle">Join us to start caring for your pets</p>
                </div>

                <form class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="registerName" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="registerEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-input" id="registerPhone" placeholder="+91 1234567890" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="registerPassword" placeholder="Create a password"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-input" id="registerConfirmPassword"
                            placeholder="Confirm your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-large">Create Account</button>
                </form>

                <div class="auth-footer">
                    Already have an account?
                    <a href="#" class="auth-link" onclick="showLogin(); return false;">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo" onclick="showPage('home')">
                    <div class="logo-icon">🐾</div>
                    <span>PetCare+</span>
                </div>
                <nav class="nav-menu">
                    <button class="nav-btn active" onclick="showPage('home')">🏠 Home</button>
                    <button class="nav-btn" onclick="showPage('pets')">🐾 My Pets</button>
                    <button class="nav-btn" onclick="showPage('vaccinations')">💉 Vaccinations</button>
                    <button class="nav-btn" onclick="showPage('orders')">📦 Orders</button>
                    <button class="nav-btn" onclick="showPage('subscription')">⭐ Subscribe</button>
                    <button class="nav-btn" onclick="showCartModal()" style="position: relative;">
                        🛒 Cart
                        <span id="cartBadge"
                            style="position: absolute; top: -8px; right: -8px; background: var(--accent-red); color: white; border-radius: 50%; width: 24px; height: 24px; display: none; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700;">0</span>
                    </button>
                    <button class="nav-btn" onclick="handleLogout()">🚪 Logout</button>
                </nav>
            </div>
        </header>

        <!-- Main Container -->
        <div class="container">
            <div id="mainContainer">
                <!-- Content will be dynamically loaded here -->
            </div>
        </div>
    </div>

    <!-- Add Pet Modal -->
    <div id="addPetModal" class="modal">
        <div class="modal-content">
            <div id="addPetModalContent">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Edit Pet Modal -->
    <div id="editPetModal" class="modal">
        <div class="modal-content">
            <div id="editPetModalContent">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Questionnaire Modal -->
    <div id="questionnaireModal" class="modal">
        <div class="modal-content">
            <div id="questionnaireContent">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Vaccination Modal -->
    <div id="vaccinationModal" class="modal">
        <div class="modal-content">
            <div id="vaccinationModalContent">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div id="cartModalContent">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div id="paymentModalContent">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Emergency Modal -->
    <div id="emergencyModal" class="modal">
        <div class="modal-content"></div>
    </div>

    <!-- Delivery Modal -->
    <div id="deliveryModal" class="modal">
        <div class="modal-content"></div>
    </div>

    <script src="pet.js"></script>
</body>

</html>
